<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ShopHub Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3"
           href="index.html">

            <i class="bi bi-bag-heart-fill text-danger me-2"></i>

            ShopHub

        </a>

    </div>

</nav>

<!-- LOGIN SECTION -->
<section class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-7">

            <div class="card border-0 shadow-lg rounded-4 p-4">

                <div class="text-center mb-4">

                    <i class="bi bi-person-circle display-3 text-danger"></i>

                    <h2 class="fw-bold mt-3">
                        Login Account
                    </h2>

                    <p class="text-muted">
                        Login to continue shopping
                    </p>

                </div>

                <!-- LOGIN FORM -->
                <form id="loginForm">

                    <!-- EMAIL -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Email Address
                        </label>

                        <input type="email"
                               id="email"
                               class="form-control py-3"
                               placeholder="Enter your email"
                               required>

                    </div>

                    <!-- PASSWORD -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            6 Digit Password
                        </label>

                        <input type="password"
                               id="password"
                               class="form-control py-3"
                               placeholder="Enter 6 digit password"
                               maxlength="6"
                               required>

                    </div>

                    <!-- BUTTON -->
                    <button type="submit"
                            class="btn btn-coral w-100 py-3 fw-bold">

                        Login

                    </button>

                </form>

                <!-- EXTRA -->
                <div class="text-center mt-4">

                    <p class="text-muted mb-0">
                        Demo Login:
                        Any Email + Any 6 Digit Password
                    </p>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- FOOTER -->
<footer class="bg-dark text-white py-4 mt-5">

    <div class="container text-center">

        <p class="mb-0 text-muted">
            © 2026 ShopHub. All rights reserved.
        </p>

    </div>

</footer>

<!-- THEME BUTTON -->
<button id="themeBtn"
        class="theme-toggle-btn btn btn-sm btn-outline-light position-fixed bottom-0 end-0 m-3">

    <i class="bi bi-moon-fill me-1"></i>

    Mode

</button>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="js/script.js"></script>

</body>

</html>
