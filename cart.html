<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopHub - Shopping Cart</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">

        <div class="container">

            <!-- LOGO -->
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <i class="bi bi-bag-heart-fill text-danger me-2"></i>
                ShopHub
            </a>

            <!-- TOGGLE BUTTON -->
            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                    aria-controls="navbarNav"
                    aria-expanded="false"
                    aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- NAVBAR MENU -->
            <div class="collapse navbar-collapse" id="navbarNav">

                <!-- MENU LINKS -->
                <ul class="navbar-nav mx-auto fw-medium">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="products.html">
                            Products
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="cart.html">
                            Cart
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">
                            Contact
                        </a>
                    </li>

                </ul>

                <!-- RIGHT SIDE ICONS -->
                <div class="d-flex align-items-center gap-3">

                    <!-- SEARCH -->
                    <a href="#" class="text-white fs-5">
                        <i class="bi bi-search"></i>
                    </a>

                    <!-- CART -->
                    <a href="cart.html"
                       class="text-white fs-5 position-relative">

                        <i class="bi bi-cart3"></i>

                        <span id="cartBadge"
                              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">

                            0

                        </span>

                    </a>

                </div>

            </div>

        </div>

    </nav>

    <!-- CART SECTION -->
    <main class="container py-5">

        <!-- PAGE TITLE -->
        <div class="text-center mb-5">

            <h2 class="fw-bold display-6">
                Your Shopping Cart
            </h2>

            <p class="text-muted">
                Manage your selected products
            </p>

        </div>

        <!-- CART CONTENT -->
        <div class="row g-4">

            <!-- CART ITEMS -->
            <div class="col-lg-8">

                <div id="cart-items">

                    <!-- CART ITEMS RENDER HERE -->

                </div>

            </div>

            <!-- CART SUMMARY -->
            <div class="col-lg-4">

                <div id="cart-summary"
                     class="bg-light p-4 rounded shadow-sm">

                    <!-- SUMMARY RENDER HERE -->

                </div>

            </div>

        </div>

    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white py-5 mt-5">

        <div class="container">

            <div class="row g-4">

                <!-- ABOUT -->
                <div class="col-md-3">

                    <h5 class="fw-bold mb-3">
                        About Us
                    </h5>

                    <ul class="list-unstyled d-flex flex-column gap-2">

                        <li>
                            <a href="#"
                               class="text-white-50 text-decoration-none">
                                Company Info
                            </a>
                        </li>

                        <li>
                            <a href="#"
                               class="text-white-50 text-decoration-none">
                                Careers
                            </a>
                        </li>

                        <li>
                            <a href="#"
                               class="text-white-50 text-decoration-none">
                                Blog
                            </a>
                        </li>

                    </ul>

                </div>

                <!-- CUSTOMER SERVICE -->
                <div class="col-md-3">

                    <h5 class="fw-bold mb-3">
                        Customer Service
                    </h5>

                    <ul class="list-unstyled d-flex flex-column gap-2">

                        <li>
                            <a href="#"
                               class="text-white-50 text-decoration-none">
                                Contact Us
                            </a>
                        </li>

                        <li>
                            <a href="#"
                               class="text-white-50 text-decoration-none">
                                FAQ
                            </a>
                        </li>

                    </ul>

                </div>

                <!-- POLICIES -->
                <div class="col-md-3">

                    <h5 class="fw-bold mb-3">
                        Policies
                    </h5>

                    <ul class="list-unstyled d-flex flex-column gap-2">

                        <li>
                            <a href="#"
                               class="text-white-50 text-decoration-none">
                                Privacy Policy
                            </a>
                        </li>

                        <li>
                            <a href="#"
                               class="text-white-50 text-decoration-none">
                                Return Policy
                            </a>
                        </li>

                    </ul>

                </div>

                <!-- SOCIAL MEDIA -->
                <div class="col-md-3">

                    <h5 class="fw-bold mb-3">
                        Follow Us
                    </h5>

                    <div class="d-flex gap-3 fs-5">

                        <a href="#" class="text-white-50">
                            <i class="bi bi-facebook"></i>
                        </a>

                        <a href="#" class="text-white-50">
                            <i class="bi bi-instagram"></i>
                        </a>

                        <a href="#" class="text-white-50">
                            <i class="bi bi-twitter-x"></i>
                        </a>

                    </div>

                </div>

            </div>

            <hr class="my-4 border-secondary">

            <!-- COPYRIGHT -->
            <div class="text-center">

                <p class="mb-0 text-muted">
                    &copy; 2026 ShopHub. All rights reserved.
                </p>

            </div>

        </div>

    </footer>

    <!-- THEME BUTTON -->
    <button id="themeBtn"
            class="theme-toggle-btn btn btn-sm btn-outline-light position-fixed bottom-0 end-0 m-3 z-3">

        <i class="bi bi-moon-fill me-1"></i>
        Mode

    </button>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="./js/script.js" defer></script>

</body>

</html>
